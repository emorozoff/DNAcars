name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/research-genetic-cars-OipDI
      - claude/fix-car-physics-OoJYe
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build web
        env:
          BASE_PATH: /DNAcars/
        run: npm run build --workspace=@dnacars/web

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

      - id: deployment
        uses: actions/deploy-pages@v4
