<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0e0e10" />
    <title>DNAcars · physics demo</title>
    <style>
      :root {
        --bg: #0e0e10;
        --fg: #e6e6e9;
        --fg-dim: #8b8b94;
        --panel: rgba(20, 20, 24, 0.8);
        --accent: #a8ff60;
        --warn: #ff5d5d;
        --border: #2a2a32;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        font: 13px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        overflow: hidden;
      }
      #app {
        position: fixed;
        inset: 0;
        display: grid;
        grid-template-rows: auto 1fr;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        background: var(--bg);
      }
      header h1 {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.04em;
      }
      header h1 .dot {
        color: var(--accent);
        margin-right: 6px;
      }
      header .hint {
        color: var(--fg-dim);
        font-size: 11px;
      }
      .stage {
        position: relative;
      }
      #canvas-host {
        position: absolute;
        inset: 0;
      }
      .hud {
        position: absolute;
        top: 14px;
        left: 14px;
        display: grid;
        grid-template-columns: auto auto;
        gap: 4px 14px;
        padding: 12px 14px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 6px;
        backdrop-filter: blur(6px);
        min-width: 200px;
      }
      .hud .label {
        color: var(--fg-dim);
      }
      .hud .value {
        font-variant-numeric: tabular-nums;
        text-align: right;
      }
      .hud .accent {
        color: var(--accent);
      }
      .hud .warn {
        color: var(--warn);
      }
      .actions {
        position: absolute;
        top: 14px;
        right: 14px;
        display: flex;
        gap: 8px;
      }
      button {
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 14px;
        font: inherit;
        cursor: pointer;
      }
      button:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .legend {
        position: absolute;
        bottom: 14px;
        left: 14px;
        display: flex;
        gap: 16px;
        padding: 8px 12px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--fg-dim);
      }
      .legend .swatch {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-right: 6px;
        vertical-align: middle;
      }
      .legend .swatch.green {
        background: var(--accent);
      }
      .legend .swatch.red {
        background: var(--warn);
      }
      .legend .swatch.grey {
        background: var(--fg-dim);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1><span class="dot">●</span>physics demo · random shapes vs hilly track</h1>
        <span class="hint">space or button → new shapes</span>
      </header>
      <div class="stage">
        <div id="canvas-host"></div>
        <div class="hud">
          <span class="label">alive</span>
          <span class="value accent" id="hud-alive">—</span>
          <span class="label">/ total</span>
          <span class="value" id="hud-total">—</span>
          <span class="label">lead</span>
          <span class="value" id="hud-lead">—</span>
          <span class="label">rolled over</span>
          <span class="value warn" id="hud-rolled">0</span>
          <span class="label">body down</span>
          <span class="value warn" id="hud-bodied">0</span>
          <span class="label">stalled</span>
          <span class="value warn" id="hud-stalled">0</span>
          <span class="label">seed</span>
          <span class="value" id="hud-seed">—</span>
        </div>
        <div class="actions">
          <button id="btn-restart">↻ new shapes</button>
        </div>
        <div class="legend">
          <span><span class="swatch grey"></span>wheel in air</span>
          <span><span class="swatch green"></span>wheel on ground</span>
          <span><span class="swatch red"></span>crashed</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/demo-physics/main.ts"></script>
  </body>
</html>
