<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0e0e10" />
    <meta name="description" content="DNAcars — evolutionary 2D car simulation in your browser" />
    <meta property="og:title" content="DNAcars" />
    <meta
      property="og:description"
      content="Watch cars evolve.  A genetic algorithm in your browser."
    />
    <meta property="og:type" content="website" />
    <title>DNAcars</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand__mark">●</span>
          <span class="brand__name">DNAcars</span>
          <span class="brand__version" id="app-version">v—</span>
        </div>
        <div class="topbar__hint" data-i18n="panel.hint">
          space → pause · button → new population
        </div>
        <button class="btn btn--ghost" id="lang-toggle" aria-label="Toggle language">EN</button>
      </header>

      <main class="stage">
        <div id="pixi-root" class="stage__canvas"></div>

        <svg class="minimap" id="minimap" viewBox="0 0 1500 86" preserveAspectRatio="none">
          <polyline class="minimap__track" id="minimap-track" />
          <rect class="minimap__viewport" id="minimap-viewport" y="0" height="86" />
          <g class="minimap__cars" id="minimap-cars"></g>
          <circle class="minimap__leader" id="minimap-leader" r="4" />
          <g class="minimap__records" id="minimap-records"></g>
        </svg>

        <aside class="hud-side hud-side--left">
          <section class="hud-card hud-card--stats">
            <span class="hud-card__label" data-i18n="panel.generation">gen</span>
            <span class="hud-card__value hud-card__value--accent" id="stat-generation">—</span>
            <span class="hud-card__label" data-i18n="panel.cars">cars</span>
            <span class="hud-card__value" id="stat-total">—</span>
            <span class="hud-card__label" data-i18n="panel.lead">lead</span>
            <span class="hud-card__value" id="stat-lead">—</span>
            <span class="hud-card__label" data-i18n="panel.bestEver">best</span>
            <span class="hud-card__value" id="stat-best">—</span>
            <span class="hud-card__label" data-i18n="panel.seed">seed</span>
            <span class="hud-card__value" id="stat-seed">—</span>
          </section>

          <section class="hud-card hud-card--controls">
            <h3 class="hud-card__heading" data-i18n="panel.evolution">evolution</h3>

            <label class="ctrl">
              <span class="ctrl__label" data-i18n="panel.population">population</span>
              <input
                class="ctrl__slider"
                type="range"
                id="ctrl-population"
                min="8"
                max="60"
                step="1"
                value="24"
              />
              <span class="ctrl__value" id="ctrl-population-val">24</span>
            </label>

            <label class="ctrl">
              <span class="ctrl__label" data-i18n="panel.mutation">mutation</span>
              <input
                class="ctrl__slider"
                type="range"
                id="ctrl-mutation"
                min="0"
                max="75"
                step="1"
                value="15"
              />
              <span class="ctrl__value" id="ctrl-mutation-val">15%</span>
            </label>

            <label class="ctrl">
              <span class="ctrl__label" data-i18n="panel.elite">elite</span>
              <input
                class="ctrl__slider"
                type="range"
                id="ctrl-elite"
                min="0"
                max="6"
                step="1"
                value="2"
              />
              <span class="ctrl__value" id="ctrl-elite-val">2</span>
            </label>
          </section>

          <section class="hud-card hud-card--controls">
            <h3 class="hud-card__heading" data-i18n="panel.trackTuning">track</h3>

            <label class="ctrl">
              <span class="ctrl__label" data-i18n="panel.pits">pits</span>
              <input
                class="ctrl__slider"
                type="range"
                id="ctrl-pits"
                min="0"
                max="100"
                step="1"
                value="0"
              />
              <span class="ctrl__value" id="ctrl-pits-val">0%</span>
            </label>

            <label class="ctrl">
              <span class="ctrl__label" data-i18n="panel.bumps">bumps</span>
              <input
                class="ctrl__slider"
                type="range"
                id="ctrl-bumps"
                min="0"
                max="100"
                step="1"
                value="0"
              />
              <span class="ctrl__value" id="ctrl-bumps-val">0%</span>
            </label>

            <label class="ctrl">
              <span class="ctrl__label" data-i18n="panel.walls">walls</span>
              <input
                class="ctrl__slider"
                type="range"
                id="ctrl-walls"
                min="0"
                max="100"
                step="1"
                value="0"
              />
              <span class="ctrl__value" id="ctrl-walls-val">0%</span>
            </label>

            <label class="ctrl">
              <span class="ctrl__label" data-i18n="panel.ceilings">ceilings</span>
              <input
                class="ctrl__slider"
                type="range"
                id="ctrl-ceilings"
                min="0"
                max="100"
                step="1"
                value="0"
              />
              <span class="ctrl__value" id="ctrl-ceilings-val">0%</span>
            </label>

            <label class="ctrl">
              <span class="ctrl__label" data-i18n="panel.cliffs">cliffs</span>
              <input
                class="ctrl__slider"
                type="range"
                id="ctrl-cliffs"
                min="0"
                max="100"
                step="1"
                value="0"
              />
              <span class="ctrl__value" id="ctrl-cliffs-val">0%</span>
            </label>

            <label class="ctrl">
              <span class="ctrl__label" data-i18n="panel.killzones">kill-zones</span>
              <input
                class="ctrl__slider"
                type="range"
                id="ctrl-killzones"
                min="0"
                max="100"
                step="1"
                value="0"
              />
              <span class="ctrl__value" id="ctrl-killzones-val">0%</span>
            </label>

            <label class="ctrl">
              <span class="ctrl__label" data-i18n="panel.slick">slick</span>
              <input
                class="ctrl__slider"
                type="range"
                id="ctrl-slick"
                min="0"
                max="100"
                step="1"
                value="0"
              />
              <span class="ctrl__value" id="ctrl-slick-val">0%</span>
            </label>

            <label class="ctrl">
              <span class="ctrl__label" data-i18n="panel.bouncy">bouncy</span>
              <input
                class="ctrl__slider"
                type="range"
                id="ctrl-bouncy"
                min="0"
                max="100"
                step="1"
                value="0"
              />
              <span class="ctrl__value" id="ctrl-bouncy-val">0%</span>
            </label>
          </section>
        </aside>

        <aside class="hud-side hud-side--right">
          <button class="btn btn--primary" id="btn-charts" data-i18n="panel.chartsToggle">
            📊 stats
          </button>
          <button class="btn btn--primary" id="btn-pause">⏸ pause</button>

          <div class="seg-group">
            <span class="seg-group__label" data-i18n="panel.speedLabel">speed</span>
            <div class="segmented" id="seg-speed" role="radiogroup">
              <button class="segmented__item" data-speed-idx="0" type="button">×1</button>
              <button class="segmented__item" data-speed-idx="1" type="button">×8</button>
              <button class="segmented__item" data-speed-idx="2" type="button">×32</button>
            </div>
          </div>

          <button class="btn btn--primary" id="btn-skip" data-i18n="panel.skipTen">
            ⏩ +10 gens
          </button>

          <div class="seg-group">
            <span class="seg-group__label" data-i18n="panel.trackLabel">track</span>
            <div class="segmented" id="seg-track" role="radiogroup">
              <button class="segmented__item" data-track-mode="random" type="button">
                <span data-i18n="panel.trackShortRandom">🎲 rand</span>
              </button>
              <button class="segmented__item" data-track-mode="fixed" type="button">
                <span data-i18n="panel.trackShortFixed">📌 fix</span>
              </button>
              <button class="segmented__item" data-track-mode="smooth" type="button">
                <span data-i18n="panel.trackShortSmooth">〰 smooth</span>
              </button>
              <button class="segmented__item" data-track-mode="extreme" type="button">
                <span data-i18n="panel.trackShortExtreme">⛰ hard</span>
              </button>
            </div>
          </div>
          <div class="confirm-anchor">
            <button class="btn btn--primary" id="btn-restart" data-i18n="panel.restart">
              ↻ new population
            </button>
            <div class="confirm-popover" id="restart-confirm" hidden>
              <p class="confirm-popover__text" data-i18n="panel.restartConfirm">
                Start a new population?
              </p>
              <div class="confirm-popover__actions">
                <button
                  class="btn btn--confirm-yes"
                  id="restart-confirm-yes"
                  data-i18n="panel.confirmYes"
                >
                  Confirm
                </button>
                <button
                  class="btn btn--confirm-no"
                  id="restart-confirm-no"
                  data-i18n="panel.confirmNo"
                >
                  Cancel
                </button>
              </div>
            </div>
          </div>
        </aside>

        <button class="btn btn--floating" id="btn-camera-leader" hidden>📍 leader</button>

        <aside class="charts-panel" id="charts-panel" hidden></aside>

        <div class="hud-card hud-card--legend">
          <span
            ><span class="swatch swatch--grey"></span
            ><span data-i18n="legend.wheelAir">wheel in air</span></span
          >
          <span
            ><span class="swatch swatch--green"></span
            ><span data-i18n="legend.wheelGround">wheel on ground</span></span
          >
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
