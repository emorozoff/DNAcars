<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0e0e10" />
    <meta name="description" content="DNAcars — evolutionary 2D car simulation in your browser" />
    <meta property="og:title" content="DNAcars" />
    <meta
      property="og:description"
      content="Watch cars evolve. A genetic algorithm in your browser."
    />
    <meta property="og:type" content="website" />
    <title>DNAcars</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand__mark">●</span>
          <span class="brand__name">DNAcars</span>
          <span class="brand__version" id="app-version">v—</span>
        </div>
        <nav class="topbar__nav">
          <button class="btn btn--ghost" data-i18n="nav.freerun">Free Run</button>
          <button class="btn btn--ghost" data-i18n="nav.daily">Daily</button>
          <button class="btn btn--ghost" id="lang-toggle" aria-label="Toggle language">EN</button>
        </nav>
      </header>

      <main class="stage">
        <div id="pixi-root" class="stage__canvas"></div>
        <aside class="panel">
          <h2 class="panel__title" data-i18n="panel.generation">Generation</h2>
          <div class="stat">
            <span class="stat__label" data-i18n="panel.gen">Gen</span>
            <span class="stat__value" id="stat-generation">—</span>
          </div>
          <div class="stat">
            <span class="stat__label" data-i18n="panel.alive">Alive</span>
            <span class="stat__value" id="stat-alive">—</span>
          </div>
          <div class="stat">
            <span class="stat__label" data-i18n="panel.lead">Lead</span>
            <span class="stat__value" id="stat-lead">—</span>
          </div>

          <div class="panel__actions">
            <button class="btn btn--primary" id="btn-fastforward" data-i18n="panel.fastforward">
              Fast Forward ×8
            </button>
            <button class="btn" id="btn-restart" data-i18n="panel.restart">
              New Population
            </button>
            <button class="btn" id="btn-arena" data-i18n="panel.arena">
              Test Arena
            </button>
          </div>

          <h3 class="panel__title panel__title--minor" data-i18n="panel.records">Records</h3>
          <div class="stat">
            <span class="stat__label" data-i18n="panel.bestEver">Best ever</span>
            <span class="stat__value" id="stat-best-ever">—</span>
          </div>
          <div class="stat">
            <span class="stat__label" data-i18n="panel.bestGen">Best gen</span>
            <span class="stat__value" id="stat-best-gen">—</span>
          </div>
          <div class="stat">
            <span class="stat__label" data-i18n="panel.lastBest">Last best</span>
            <span class="stat__value" id="stat-last-best">—</span>
          </div>
        </aside>
      </main>

      <footer class="footer">
        <span data-i18n="footer.tagline">Evolution, in your browser.</span>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
